<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ doc.fields.title if doc.fields.title else doc.id }} — Документ</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --primary: #2563eb;
            --border: #e5e7eb;
            --ring: rgba(37, 99, 235, 0.35);
            --chip: #eef2ff;
        }

        [data-theme="dark"] {
            --bg: #0b1220;
            --card: #0f172a;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --primary: #60a5fa;
            --border: #1f2937;
            --ring: rgba(96, 165, 250, 0.35);
            --chip: #111827;
        }

        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: saturate(180%) blur(8px);
            background-color: color-mix(in srgb, var(--bg) 75%, transparent);
            border-bottom: 1px solid var(--border);
        }

        .topbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 20px;
        }

        .brand { display: flex; align-items: center; gap: 10px; color: var(--muted); }
        .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 8px; cursor: pointer; }
        .icon-btn:hover { border-color: var(--primary); }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .back { color: var(--muted); text-decoration: none; }
        .back:hover { color: var(--primary); }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px; box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
        .title { margin: 0 0 10px; }
        .meta { color: var(--muted); font-size: 0.95em; margin-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
        .badge { border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 3px 8px; font-size: 12px; }
        .keywords { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .chip { background: var(--chip); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 999px; font-size: 12px; }
        .content { white-space: pre-wrap; line-height: 1.65; color: var(--text); }
        .section-title { margin: 18px 0 10px; color: var(--muted); font-size: 0.95em; font-weight: 600; }
        .fields { margin-top: 12px; }
        .field { padding: 8px 0; border-top: 1px solid var(--border); }
        a { color: #1d4ed8; text-decoration: none; }
        [data-theme="dark"] a { color: #93c5fd; }
        a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="topbar">
        <div class="topbar-inner">
            <div class="brand">📄 Документ</div>
            <div>
                <button id="themeToggle" class="icon-btn" title="Переключить тему">🌓</button>
                <a class="icon-btn" href="/" title="К поиску">← Назад</a>
            </div>
        </div>
    </div>

    <div class="container">
        <p><a class="back" href="/">← Назад к поиску</a></p>
        <div class="card">
            <div style="display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;">
                <h1 class="title" style="margin: 0;">{{ doc.fields.title or 'Без названия' }}</h1>
                {% if doc.fields.url %}
                <a href="{{ doc.fields.url }}" target="_blank" rel="noreferrer" style="font-size: 14px; color: var(--muted); text-decoration: none;" title="Открыть оригинал">🔗</a>
                {% endif %}
            </div>
            <div class="meta">
                <span class="badge">id: {{ doc.id }}</span>
                {% if doc.fields.url %}
                <span class="badge"><a href="{{ doc.fields.url }}" target="_blank" rel="noreferrer" style="color: inherit; text-decoration: none;">🔗 url</a></span>
                {% endif %}
            </div>

            <div class="section-title">Содержимое</div>
            <div class="content">{{ doc.content }}</div>
        </div>
    </div>
  <script>
    (function initTheme(){
        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();

    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        });
    }
  </script>
  </body>
 </html>
