syntax = "proto3";

message Document {
  string id = 1;
  string title = 2;
  string text = 3;
  string url = 4;
}

message DocumentCollection {
  repeated Document documents = 1;
}

message DeltaEncodedIds {
  int32 first_id = 1;
  repeated int32 deltas = 2 [packed = true];
}

message PostingList {
  string term = 1;
  DeltaEncodedIds doc_ids = 2;
  repeated int32 frequencies = 3 [packed = true];
}

message InvertedIndex {
  repeated PostingList postings = 1;
}

message PositionalPosting {
  int32 doc_id = 1;
  int32 frequency = 2;
  int32 first_position = 3;
  repeated int32 position_deltas = 4 [packed = true];
}

message PositionalPostingList {
  string term = 1;
  repeated PositionalPosting postings = 2;
}

message PositionalIndex {
  repeated PositionalPostingList postings = 1;
  int32 total_documents = 2;
  int32 total_terms = 3;
}