syntax = "proto3";

message Document {
  int32 id = 1;
  string title = 2;
  string text = 3;
  string url = 4;
}

message DocumentCollection {
  map<int32, Document> id2document = 1;
}

message PostingList {
  int32 first_id = 1;
  repeated int32 deltas = 2 [packed = true];
}

message InvertedIndex {
  map<string, PostingList> term2postingList = 1;
}

message PositionalPostingList {
  int32 first_position = 1;
  repeated int32 position_deltas = 2 [packed = true];
}

message  PositionalPosting{
  map<string, PositionalPostingList> term2positionsList = 1;
}

message PositionalIndex {
  map<int32, PositionalPosting> docId2termPositionsLists = 1;
}